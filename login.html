<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .head > h1 {
            Color: white;
            font-size: 14vh;

        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: blueviolet;
            height: 20vh;
            text-align: center;
        }

        main {
            background-color: rgb(72, 46, 96);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
        }

        .form {
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 10vh;
            padding: 10px;
            background-color: blueviolet;
            color: white;
            border: none;
            cursor: pointer;
        }

        .foot {
            display: flex;
            justify-content: center;
            align-items: center;
            color: aliceblue;
            background-color: blueviolet;
            height: 20vh;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <div class="head">
            <h1>Welcome back!</h1>
        </div>
    </header>
    <main>
        <div class="form">
            <p>Enter your Credentials.</p>
            <form method="post">
                <!-- <label for="Name">Name:</label>
                <input id="Name" type="text" placeholder="Enter your Name">
                <br> -->
                <label for="Email">Email:</label>
                <input id="Email" type="email" placeholder="Enter your Email">
                <br>
                <label for="Password">Password:</label>
                <input id="Password" type="password" placeholder="Enter your Passoword">
                <br>
                <!-- <label for="c_password">Confirm password:</label>
                <input id="c_password" type="password" >
                <br> -->
                <button>Log in</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="foot">
            <h1>New here?
                <br>
            <a href="index.html">Signing in!</a></h1>
        </div>
    </footer>
</body>

</html>
